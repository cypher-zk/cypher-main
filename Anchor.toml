[toolchain]
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.localnet]
cypher_main = "cyphPe923pnPGVXJL3a3P7t2W9mJsagBcg1oeauoh2B"

[programs.devnet]
cypher_main = "cyphPe923pnPGVXJL3a3P7t2W9mJsagBcg1oeauoh2B"

[provider]
cluster = "https://devnet.helius-rpc.com/?api-key=8c79234f-3452-457b-96e3-171b70c0cfd4"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[hooks]

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "127.0.0.1"
ledger = ".anchor/test-ledger"
rpc_port = 8899

# Pre-load the CSDC mint at the address the program pins via `ACCEPTED_MINT`
# so `arcium test` / `anchor test` can satisfy the on-chain constraints
# without a devnet round-trip. Regenerate the file when the test wallet at
# ~/.config/solana/id.json changes:
#   yarn setup:mint
[[test.validator.account]]
address = "8AF9BABNWwEhipRxtXPYoWSZW24SKjUn6YqbKd9ZqhwB"
filename = "tests/fixtures/csdc_mint.json"
